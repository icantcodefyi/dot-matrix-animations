<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" role="img" aria-label="Orbit">
  <title>Orbit</title>
  <desc>A single dot circles the perimeter at a steady pace.</desc>
  <style>
    .bg { fill: #f5f5f5; opacity: 0.07; }
    .lit { fill: #ffffff; opacity: 0; animation: kf 2400ms linear infinite both; }
    @keyframes kf {0%   { opacity: 0; }
4%   { opacity: 1; }
26%  { opacity: 0.08; }
100% { opacity: 0; }}
    @media (prefers-reduced-motion: reduce) { .lit { animation: none; opacity: 0.45; } }
    .d00 { animation-delay: 0ms; }
    .d01 { animation-delay: 150ms; }
    .d02 { animation-delay: 300ms; }
    .d03 { animation-delay: 450ms; }
    .d04 { animation-delay: 600ms; }
    .d10 { animation-delay: 2250ms; }
    .d14 { animation-delay: 750ms; }
    .d20 { animation-delay: 2100ms; }
    .d24 { animation-delay: 900ms; }
    .d30 { animation-delay: 1950ms; }
    .d34 { animation-delay: 1050ms; }
    .d40 { animation-delay: 1800ms; }
    .d41 { animation-delay: 1650ms; }
    .d42 { animation-delay: 1500ms; }
    .d43 { animation-delay: 1350ms; }
    .d44 { animation-delay: 1200ms; }
  </style>
  <circle class="bg" cx="6.00" cy="6.00" r="2.4" />
  <circle class="bg" cx="17.00" cy="6.00" r="2.4" />
  <circle class="bg" cx="28.00" cy="6.00" r="2.4" />
  <circle class="bg" cx="39.00" cy="6.00" r="2.4" />
  <circle class="bg" cx="50.00" cy="6.00" r="2.4" />
  <circle class="bg" cx="6.00" cy="17.00" r="2.4" />
  <circle class="bg" cx="17.00" cy="17.00" r="2.4" />
  <circle class="bg" cx="28.00" cy="17.00" r="2.4" />
  <circle class="bg" cx="39.00" cy="17.00" r="2.4" />
  <circle class="bg" cx="50.00" cy="17.00" r="2.4" />
  <circle class="bg" cx="6.00" cy="28.00" r="2.4" />
  <circle class="bg" cx="17.00" cy="28.00" r="2.4" />
  <circle class="bg" cx="28.00" cy="28.00" r="2.4" />
  <circle class="bg" cx="39.00" cy="28.00" r="2.4" />
  <circle class="bg" cx="50.00" cy="28.00" r="2.4" />
  <circle class="bg" cx="6.00" cy="39.00" r="2.4" />
  <circle class="bg" cx="17.00" cy="39.00" r="2.4" />
  <circle class="bg" cx="28.00" cy="39.00" r="2.4" />
  <circle class="bg" cx="39.00" cy="39.00" r="2.4" />
  <circle class="bg" cx="50.00" cy="39.00" r="2.4" />
  <circle class="bg" cx="6.00" cy="50.00" r="2.4" />
  <circle class="bg" cx="17.00" cy="50.00" r="2.4" />
  <circle class="bg" cx="28.00" cy="50.00" r="2.4" />
  <circle class="bg" cx="39.00" cy="50.00" r="2.4" />
  <circle class="bg" cx="50.00" cy="50.00" r="2.4" />
  <circle class="lit d00" cx="6.00" cy="6.00" r="3.1" />
  <circle class="lit d01" cx="17.00" cy="6.00" r="3.1" />
  <circle class="lit d02" cx="28.00" cy="6.00" r="3.1" />
  <circle class="lit d03" cx="39.00" cy="6.00" r="3.1" />
