<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" role="img" aria-label="Static">
  <title>Static</title>
  <desc>VHS noise — every dot flickers on its own delay and duration.</desc>
  <style>
    .bg { fill: #f5f5f5; opacity: 0.07; }
    .lit { fill: #ffffff; opacity: 0; animation: kf 1400ms linear infinite both; }
    @keyframes kf {0%   { opacity: 0.05; }
45%  { opacity: 0.05; }
50%  { opacity: 1; }
55%  { opacity: 0.05; }
100% { opacity: 0.05; }}
    @media (prefers-reduced-motion: reduce) { .lit { animation: none; opacity: 0.45; } }
    .d00 { animation-delay: 550ms; animation-duration: 1760ms; }
    .d01 { animation-delay: 267ms; animation-duration: 2025ms; }
    .d02 { animation-delay: 827ms; animation-duration: 2025ms; }
    .d03 { animation-delay: 713ms; animation-duration: 1846ms; }
