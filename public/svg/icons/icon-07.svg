<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" role="img" aria-label="Loading">
  <title>Loading</title>
  <desc>A trailing spinner sweeps the outer ring.</desc>
  <style>
    .bg { fill: #f5f5f5; opacity: 0.07; }
    .lit { fill: #ffffff; opacity: 0; animation: kf 2000ms linear infinite both; transform-box: fill-box; transform-origin: center; will-change: opacity, transform; }
    @keyframes kf {0%   { opacity: 0; transform: scale(1); }
4%   { opacity: 1; transform: scale(1.10); }
26%  { opacity: 0.08; transform: scale(1); }
100% { opacity: 0; transform: scale(1); }}
    @media (prefers-reduced-motion: reduce) { .lit { animation: none; opacity: 0.45; transform: none; } }
    .d00 { animation-delay: 0ms; }
    .d01 { animation-delay: 125ms; }
    .d02 { animation-delay: 250ms; }
    .d03 { animation-delay: 375ms; }
    .d04 { animation-delay: 500ms; }
    .d10 { animation-delay: 1875ms; }
    .d14 { animation-delay: 625ms; }
    .d20 { animation-delay: 1750ms; }
    .d24 { animation-delay: 750ms; }
    .d30 { animation-delay: 1625ms; }
    .d34 { animation-delay: 875ms; }
    .d40 { animation-delay: 1500ms; }
    .d41 { animation-delay: 1375ms; }
    .d42 { animation-delay: 1250ms; }
    .d43 { animation-delay: 1125ms; }
    .d44 { animation-delay: 1000ms; }
  </style>
  <circle class="bg" cx="6.00" cy="6.00" r="2.4" />
  <circle class="bg" cx="17.00" cy="6.00" r="2.4" />
