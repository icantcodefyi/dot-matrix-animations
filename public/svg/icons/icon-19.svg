<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" role="img" aria-label="Thinking"><title>Thinking</title><desc>Inner cluster fires like neurons while the field rests.</desc><defs><circle id="b" r="2.4" fill="#ffffff" opacity="0.07"/><circle id="l" r="3.1"/></defs><style>.l{fill:#ffffff;opacity:0;animation:icon-19-k 1800ms cubic-bezier(0.65, 0, 0.35, 1) infinite both;}@keyframes icon-19-k{0%{opacity:0.05;}30%{opacity:0.05;}40%{opacity:1;}55%{opacity:0.10;}100%{opacity:0.05;}}@media (prefers-reduced-motion:reduce){.l{animation:none;opacity:0.45;}}.d11{animation-delay:1352ms;}.d12{animation-delay:1197ms;}.d13{animation-delay:823ms;}.d21{animation-delay:1661ms;}.d22{animation-delay:884ms;}.d23{animation-delay:873ms;}.d31{animation-delay:787ms;}.d32{animation-delay:1280ms;}.d33{animation-delay:1366ms;}</style><use href="#b" x="6" y="6"/><use href="#b" x="17" y="6"/><use href="#b" x="28" y="6"/><use href="#b" x="39" y="6"/><use href="#b" x="50" y="6"/><use href="#b" x="6" y="17"/><use href="#b" x="17" y="17"/><use href="#b" x="28" y="17"/><use href="#b" x="39" y="17"/><use href="#b" x="50" y="17"/><use href="#b" x="6" y="28"/><use href="#b" x="17" y="28"/><use href="#b" x="28" y="28"/><use href="#b" x="39" y="28"/><use href="#b" x="50" y="28"/><use href="#b" x="6" y="39"/><use href="#b" x="17" y="39"/><use href="#b" x="28" y="39"/><use href="#b" x="39" y="39"/><use href="#b" x="50" y="39"/><use href="#b" x="6" y="50"/><use href="#b" x="17" y="50"/><use href="#b" x="28" y="50"/><use href="#b" x="39" y="50"/><use href="#b" x="50" y="50"/><use class="l d11" href="#l" x="17" y="17"/><use class="l d12" href="#l" x="28" y="17"/><use class="l d13" href="#l" x="39" y="17"/><use class="l d21" href="#l" x="17" y="28"/><use class="l d22" href="#l" x="28" y="28"/><use class="l d23" href="#l" x="39" y="28"/><use class="l d31" href="#l" x="17" y="39"/><use class="l d32" href="#l" x="28" y="39"/><use class="l d33" href="#l" x="39" y="39"/></svg>
