<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" role="img" aria-label="Thinking">
  <title>Thinking</title>
  <desc>Inner cluster fires like neurons while the field rests.</desc>
  <style>
    .bg { fill: #f5f5f5; opacity: 0.07; }
    .lit { fill: #ffffff; opacity: 0; animation: kf 1800ms cubic-bezier(0.65, 0, 0.35, 1) infinite both; transform-box: fill-box; transform-origin: center; will-change: opacity, transform; }
    @keyframes kf {0%   { opacity: 0.05; transform: scale(1); }
30%  { opacity: 0.05; transform: scale(1); }
40%  { opacity: 1; transform: scale(1.14); }
55%  { opacity: 0.10; transform: scale(1); }
100% { opacity: 0.05; transform: scale(1); }}
    @media (prefers-reduced-motion: reduce) { .lit { animation: none; opacity: 0.45; transform: none; } }
    .d11 { animation-delay: 1352ms; }
    .d12 { animation-delay: 1197ms; }
    .d13 { animation-delay: 823ms; }
    .d21 { animation-delay: 1661ms; }
    .d22 { animation-delay: 884ms; }
    .d23 { animation-delay: 873ms; }
    .d31 { animation-delay: 787ms; }
    .d32 { animation-delay: 1280ms; }
    .d33 { animation-delay: 1366ms; }
  </style>
  <circle class="bg" cx="6.00" cy="6.00" r="2.4" />
  <circle class="bg" cx="17.00" cy="6.00" r="2.4" />
  <circle class="bg" cx="28.00" cy="6.00" r="2.4" />
