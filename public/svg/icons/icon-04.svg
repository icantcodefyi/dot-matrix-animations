    .d21 { animation-delay: 220ms; }
    .d22 { animation-delay: 0ms; }
    .d23 { animation-delay: 220ms; }
    .d24 { animation-delay: 440ms; }
    .d30 { animation-delay: 660ms; }
    .d31 { animation-delay: 440ms; }
