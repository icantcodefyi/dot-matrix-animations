<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" role="img" aria-label="Cross Expand">
  <title>Cross Expand</title>
  <desc>A plus shape blooms outward in Manhattan steps.</desc>
  <style>
    .bg { fill: #f5f5f5; opacity: 0.07; }
    .lit { fill: #ffffff; opacity: 0; animation: kf 2200ms cubic-bezier(0.16, 1, 0.3, 1) infinite both; transform-box: fill-box; transform-origin: center; will-change: opacity, transform; }
    @keyframes kf {0%   { opacity: 0; transform: scale(1); }
8%   { opacity: 1; transform: scale(1.18); }
36%  { opacity: 0.05; transform: scale(1); }
100% { opacity: 0; transform: scale(1); }}
    @media (prefers-reduced-motion: reduce) { .lit { animation: none; opacity: 0.45; transform: none; } }
    .d00 { animation-delay: 880ms; }
    .d01 { animation-delay: 660ms; }
    .d02 { animation-delay: 440ms; }
    .d03 { animation-delay: 660ms; }
    .d04 { animation-delay: 880ms; }
    .d10 { animation-delay: 660ms; }
