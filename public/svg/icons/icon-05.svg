<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" role="img" aria-label="Rain">
  <title>Rain</title>
  <desc>Independent drops fall column by column.</desc>
  <style>
    .bg { fill: #f5f5f5; opacity: 0.07; }
    .lit { fill: #ffffff; opacity: 0; animation: kf 1800ms cubic-bezier(0.25, 1, 0.5, 1) infinite both; transform-box: fill-box; transform-origin: center; will-change: opacity, transform; }
    @keyframes kf {0%   { opacity: 0; }
6%   { opacity: 1; }
22%  { opacity: 0.10; }
100% { opacity: 0; }}
    @media (prefers-reduced-motion: reduce) { .lit { animation: none; opacity: 0.45; transform: none; } }
    .d00 { animation-delay: 0ms; }
    .d01 { animation-delay: 990ms; }
    .d02 { animation-delay: 360ms; }
