<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="dot/matrix — 60 quiet loaders">
  <rect width="1200" height="630" fill="#1c1b18" />

  <!-- top hairline + chrome -->
  <line x1="80" y1="72" x2="1120" y2="72" stroke="#2a2925" stroke-width="1" />
  <text x="80" y="50" fill="#c4c2bb" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="17" font-weight="500" letter-spacing="0.3">
    dot<tspan fill="#6a6863">/</tspan>matrix
  </text>
  <text x="1120" y="50" text-anchor="end" fill="#9a9892" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="17" letter-spacing="1">
    60 LOADERS  ·  v0.1
  </text>

  <!-- title -->
  <text x="80" y="305" fill="#f5f5f3" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, system-ui, sans-serif" font-size="104" font-weight="500" letter-spacing="-3">
    A small library
  </text>
  <text x="80" y="425" fill="#f5f5f3" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, system-ui, sans-serif" font-size="104" font-weight="500" letter-spacing="-3">
    of quiet loaders<tspan fill="#6a6863">.</tspan>
  </text>

  <!-- bottom hairline + chrome -->
  <line x1="80" y1="558" x2="1120" y2="558" stroke="#2a2925" stroke-width="1" />
  <text x="80" y="590" fill="#9a9892" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="17" letter-spacing="0.6">
    dot-matrix-animations.vercel.app
  </text>
  <text x="1120" y="590" text-anchor="end" fill="#9a9892" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="17" letter-spacing="1.2">
    5×5  ·  ~4 KB  ·  NO JS
  </text>
